---
- name: Update Debian packages
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Default OFF. Override at runtime with -e do_reboot=true for a supervised reboot.
    do_reboot: false

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages to latest version
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: upgrade_result

    - name: Print upgrade summary
      ansible.builtin.debug:
        msg: "Upgraded packages: {{ upgrade_result.stdout_lines | default(['No output']) }}"

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Notify if reboot is needed
      ansible.builtin.debug:
        msg: >-
          NOTICE: A reboot is required on {{ inventory_hostname }}.
          {{ 'Rebooting now (do_reboot=true).' if do_reboot | bool
             else 'Skipping — re-run with do_reboot=true to reboot.' }}
      when: reboot_required_file.stat.exists

    # Only reboots when explicitly requested AND actually needed.
    # The module waits for the host to come back and fails if it does not.
    - name: Reboot if required and approved
      ansible.builtin.reboot:
        msg: "Reboot triggered by Ansible after package update"
        reboot_timeout: 600          # fail if host doesn't return within 10 min
        post_reboot_delay: 15
        test_command: uptime
      when:
        - reboot_required_file.stat.exists
        - do_reboot | bool
