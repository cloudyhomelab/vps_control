---
- name: Deploy Podman Quadlet apps
  hosts: all
  become: true
  gather_facts: true

  roles:
    # Deploy the shared network first so it exists before any container that
    # joins it (Network=web.network) is started.
    - role: application
      application_name: shared

    - role: application
      application_name: calculators
      application_enable_units:
        - calculators.service

    - role: application
      application_name: reverse_proxy
      application_enable_units:
        - caddy.service

    # Deployed after reverse_proxy so caddy.service exists when its route is registered.
    - role: simple_container
      simple_container_state: present
      simple_container_name: nasplan
      simple_container_image: docker.io/binarycodes/make-my-nas:latest
      simple_container_port: 8080
      simple_container_domain: nasplan.cloudyhome.org

  post_tasks:
    # Graceful, zero-downtime reload (via the unit's ExecReload) so Caddy picks
    # up any added/changed route snippets and re-resolves recreated upstreams.
    # Certs are reused from the caddy-data volume — no ACME re-issuance.
    - name: Reload Caddy to apply route changes
      ansible.builtin.systemd:
        name: caddy.service
        state: reloaded

    # Host-wide timer that runs `podman auto-update` daily (00:00 + up to
    # 15 min jitter), refreshing every container marked AutoUpdate=registry.
    - name: Enable the Podman auto-update timer
      ansible.builtin.systemd:
        name: podman-auto-update.timer
        enabled: true
        state: started
