---
- name: Deploy Podman Quadlet apps
  hosts: all
  become: true
  gather_facts: true

  roles:
    # Deploy the shared network first so it exists before any container that
    # joins it (Network=web.network) is started.
    - role: application
      application_kind: source
      application_name: shared

    - role: application
      application_kind: source
      application_name: calculators
      application_enable_units:
        - calculators.service

    - role: application
      application_kind: source
      application_name: reverse_proxy
      application_enable_units:
        - caddy.service

    # Deployed after reverse_proxy so caddy.service exists when its route is registered.
    - role: application
      application_kind: simple
      application_name: nasplan
      application_image: docker.io/binarycodes/make-my-nas:latest
      application_port: 8080
      application_domain: nasplan.cloudyhome.org

    - role: application
      application_state: absent
      application_kind: simple
      application_name: whoami

  post_tasks:
    # Per-app roles write route snippets but Caddy only applies them on reload,
    # so reload once centrally after all apps are converged. Reload, not restart,
    # to keep existing connections up.
    - name: Reload Caddy to apply route changes
      ansible.builtin.systemd:
        name: caddy.service
        state: reloaded

    # Host-wide timer that runs `podman auto-update` refreshing every container marked AutoUpdate=registry.
    - name: Enable the Podman auto-update timer
      ansible.builtin.systemd:
        name: podman-auto-update.timer
        enabled: true
        state: started
