---
argument_specs:
  main:
    short_description: Deploy one app's Quadlet files, systemd units, and config.
    options:
      application_name:
        type: str
        required: true
        description: App directory name under application_apps_dir.
      application_enable_units:
        type: list
        elements: str
        required: false
        default: []
        description: systemd unit names to enable at boot and start now.
