---
galaxy_info:
  role_name: application
  author: infra
  description: >-
    Deploy or decommission one app behind the reverse proxy: either install its
    Podman Quadlet files, systemd units, and config from a source directory
    (kind=source), or render a single-container Quadlet from inline params
    (kind=simple). Optionally registers a Caddy route.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions: [all]
    - name: Ubuntu
      versions: [all]
dependencies: []
