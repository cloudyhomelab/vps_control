---
# 'simple' kind: render the single-container Quadlet from inline params. 'source'
# kind installs its container from a file instead (the copy tasks below).
- name: "Render Quadlet for container {{ application_name }}"
  ansible.builtin.template:
    src: container.container.j2
    dest: "{{ application_system_dir }}/{{ application_name }}.container"
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_file_mode }}"
  when: application_kind == 'simple'
  notify: Reload systemd

- name: "Install Quadlet files for app {{ application_name }}"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ application_system_dir }}/"
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_file_mode }}"
  loop: "{{ query('ansible.builtin.fileglob', application_apps_dir ~ '/' ~ application_name ~ '/quadlet/*') }}"
  when: application_kind == 'source'
  notify: Reload systemd

- name: "Install systemd units for app {{ application_name }}"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ application_unit_dir }}/"
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_file_mode }}"
  loop: "{{ query('ansible.builtin.fileglob', application_apps_dir ~ '/' ~ application_name ~ '/unit/*') }}"
  when: application_kind == 'source'
  notify: Reload systemd

- name: "Check for config directory of app {{ application_name }}"
  ansible.builtin.stat:
    path: "{{ application_apps_dir }}/{{ application_name }}/config"
  delegate_to: localhost
  become: false
  register: application_config_dir

- name: "Deploy config tree for app {{ application_name }}"
  ansible.builtin.copy:
    src: "{{ application_apps_dir }}/{{ application_name }}/config/"
    dest: "{{ application_config_root }}/{{ application_name }}/config/"
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_file_mode }}"
    directory_mode: "{{ application_dir_mode }}"
  when: application_config_dir.stat.exists and application_config_dir.stat.isdir

# Caddy route: only written when the app opts in with application_domain. The
# snippet is imported by the central Caddyfile, so no daemon-reload is needed and
# Caddy is reloaded once by the deploy playbook (post-task), not by this role.
- name: "Ensure Caddy conf.d directory exists for route of {{ application_name }}"
  ansible.builtin.file:
    path: "{{ application_caddy_confd }}"
    state: directory
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_dir_mode }}"
  when: application_domain is defined and (application_domain | string | length > 0)

- name: "Register Caddy route for {{ application_name }}"
  ansible.builtin.template:
    src: caddy-site.caddy.j2
    dest: "{{ application_caddy_confd }}/{{ application_name }}.caddy"
    owner: "{{ application_owner }}"
    group: "{{ application_group }}"
    mode: "{{ application_file_mode }}"
  when: application_domain is defined and (application_domain | string | length > 0)

# Regenerate Quadlet-derived services and pick up new unit files before we
# touch their state. Handlers notified above run here, not at end of play.
- name: Apply unit changes (systemd daemon-reload)
  ansible.builtin.meta: flush_handlers

- name: "Start units for app {{ application_name }}"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
  loop: "{{ application_managed_units }}"

# Quadlet-generated services live in /run and are "transient or generated",
# so `systemctl enable` on them fails — boot persistence comes from their
# [Install] section instead. Tolerate exactly that case; fail on anything else.
- name: "Enable boot-start of units for app {{ application_name }}"
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop: "{{ application_managed_units }}"
  register: application_enable_result
  failed_when:
    - application_enable_result is failed
    - "'transient or generated' not in (application_enable_result.msg | default(''))"
    - "'no installation config' not in (application_enable_result.msg | default('') | lower)"
