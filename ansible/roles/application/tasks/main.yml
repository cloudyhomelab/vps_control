---
# Deploys (state=present) or decommissions (state=absent) one app. Two kinds:
#   source -> install Quadlet files, systemd units, and a config tree from a
#             controller directory ({{ application_apps_dir }}/<name>/).
#   simple -> render a single-container Quadlet from inline params (image, env, ...).
# Both kinds optionally register a Caddy route. See README + defaults/main.yml.

- name: Validate role input
  ansible.builtin.assert:
    that:
      - application_name is defined
      - application_name | string | length > 0
      - application_kind is defined
      - application_kind in ['source', 'simple']
      # 'simple' renders from an image, so present requires one (absent does not).
      - application_kind != 'simple' or application_state == 'absent' or (application_image is defined and (application_image | string | length > 0))
    fail_msg: >-
      The 'application' role requires 'application_name' and 'application_kind'
      (source|simple); a 'simple' app being deployed (state=present) also requires
      'application_image'.
    quiet: true

- name: "Deploy app {{ application_name }}"
  ansible.builtin.include_tasks: present.yml
  when: application_state == 'present'

- name: "Decommission app {{ application_name }}"
  ansible.builtin.include_tasks: absent.yml
  when: application_state == 'absent'
