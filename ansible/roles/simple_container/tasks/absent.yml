---
- name: "Check deployment state of container {{ simple_container_name }}"
  ansible.builtin.stat:
    path: "{{ simple_container_system_dir }}/{{ simple_container_name }}.container"
  register: simple_container_quadlet

# Stop while the generated unit still exists; this also removes the container
# (Quadlet's ExecStopPost). Skipped if the app was never deployed.
- name: "Stop service for container {{ simple_container_name }}"
  ansible.builtin.systemd:
    name: "{{ simple_container_name }}.service"
    state: stopped
  when: simple_container_quadlet.stat.exists

- name: "Remove Quadlet and Caddy route for {{ simple_container_name }}"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ simple_container_system_dir }}/{{ simple_container_name }}.container"
    - "{{ simple_container_caddy_confd }}/{{ simple_container_name }}.caddy"
  notify: Reload systemd (simple_container)

# Forget the now-removed generated unit. The Caddy route is dropped by the deploy
# playbook's post-task reload once the snippet above is gone.
- name: Apply unit changes (systemd daemon-reload)
  ansible.builtin.meta: flush_handlers
