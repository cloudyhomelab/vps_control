---
# Deploys a single-image web app behind the reverse proxy from a minimal spec.
# Parameters are role-prefixed (see defaults/main.yml and README).

- name: Validate role input
  ansible.builtin.assert:
    that:
      - simple_container_name is defined
      - simple_container_name | string | length > 0
      - simple_container_image is defined
      - simple_container_image | string | length > 0
    fail_msg: >-
      The 'simple_container' role requires 'simple_container_name' (container
      name) and 'simple_container_image' (full image reference).
    quiet: true

- name: "Render Quadlet for container {{ simple_container_name }}"
  ansible.builtin.template:
    src: container.container.j2
    dest: "{{ simple_container_system_dir }}/{{ simple_container_name }}.container"
    owner: "{{ simple_container_owner }}"
    group: "{{ simple_container_group }}"
    mode: "{{ simple_container_file_mode }}"
  notify: Reload systemd (simple_container)

- name: "Ensure Caddy conf.d directory exists for route of {{ simple_container_name }}"
  ansible.builtin.file:
    path: "{{ simple_container_caddy_confd }}"
    state: directory
    owner: "{{ simple_container_owner }}"
    group: "{{ simple_container_group }}"
    mode: "{{ simple_container_dir_mode }}"
  when: simple_container_domain is defined and (simple_container_domain | string | length > 0)

- name: "Register Caddy route for {{ simple_container_name }}"
  ansible.builtin.template:
    src: caddy-site.caddy.j2
    dest: "{{ simple_container_caddy_confd }}/{{ simple_container_name }}.caddy"
    owner: "{{ simple_container_owner }}"
    group: "{{ simple_container_group }}"
    mode: "{{ simple_container_file_mode }}"
  when: simple_container_domain is defined and (simple_container_domain | string | length > 0)

# Regenerate the Quadlet-derived service before we touch unit state. The handler
# notified above runs here, not at end of play. (Caddy is reloaded once by the
# deploy playbook as a post-task, not per app.)
- name: Apply unit changes (systemd daemon-reload, Caddy reload)
  ansible.builtin.meta: flush_handlers

- name: "Start service for container {{ simple_container_name }}"
  ansible.builtin.systemd:
    name: "{{ simple_container_name }}.service"
    state: started

# Quadlet-generated services live in /run and are "transient or generated",
# so `systemctl enable` on them fails — boot persistence comes from the
# [Install] section instead. Tolerate exactly that case; fail on anything else.
- name: "Enable boot-start for container {{ simple_container_name }}"
  ansible.builtin.systemd:
    name: "{{ simple_container_name }}.service"
    enabled: true
  register: simple_container_enable_result
  failed_when:
    - simple_container_enable_result is failed
    - "'transient or generated' not in (simple_container_enable_result.msg | default(''))"
    - "'no installation config' not in (simple_container_enable_result.msg | default('') | lower)"
