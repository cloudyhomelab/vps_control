---
# Deploys (state=present) or decommissions (state=absent) a single-image web app
# behind the reverse proxy. Parameters are role-prefixed (see defaults + README).

- name: Validate role input
  ansible.builtin.assert:
    that:
      - simple_container_name is defined
      - simple_container_name | string | length > 0
      - simple_container_state == 'absent' or (simple_container_image is defined and (simple_container_image | string | length > 0))
    fail_msg: >-
      simple_container requires 'simple_container_name' (always) and
      'simple_container_image' (when simple_container_state is present).
    quiet: true

- name: "Deploy container {{ simple_container_name }}"
  ansible.builtin.include_tasks: present.yml
  when: simple_container_state == 'present'

- name: "Decommission container {{ simple_container_name }}"
  ansible.builtin.include_tasks: absent.yml
  when: simple_container_state == 'absent'
