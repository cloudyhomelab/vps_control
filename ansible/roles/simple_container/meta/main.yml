---
galaxy_info:
  role_name: simple_container
  author: infra
  description: >-
    Deploy a single-image web app behind the reverse proxy from a minimal spec
    (just an image, optionally a domain): renders its Podman Quadlet, joins the
    shared network, and registers a Caddy route.
  license: MIT
  min_ansible_version: "2.14"
  platforms:
    - name: Debian
      versions: [all]
    - name: Ubuntu
      versions: [all]
dependencies: []
