---
argument_specs:
  main:
    short_description: Deploy a single-image web app behind the reverse proxy.
    options:
      simple_container_name:
        type: str
        required: true
        description: >-
          Container name; also the Quadlet basename and the network DNS name
          the reverse proxy resolves.
      simple_container_image:
        type: str
        required: true
        description: Full image reference, e.g. docker.io/org/app:latest.
      simple_container_domain:
        type: str
        required: false
        description: >-
          Public hostname. When set, a Caddy route (domain -> name:port) is
          written to the imported conf.d directory.
      simple_container_port:
        type: int
        required: false
        default: 8080
        description: Internal upstream port for the Caddy route.
      simple_container_description:
        type: str
        required: false
        description: Unit description (default "<name> container").
      simple_container_network:
        type: str
        required: false
        default: web.network
        description: Podman network to join.
      simple_container_env:
        type: dict
        required: false
        default: {}
        description: Environment variables rendered as Environment= lines.
      simple_container_volumes:
        type: list
        elements: str
        required: false
        default: []
        description: Raw Quadlet Volume= values (e.g. "name.volume:/data" or host:container).
      simple_container_publish_ports:
        type: list
        elements: str
        required: false
        default: []
        description: Raw Quadlet PublishPort= values for apps that need a host port.
      simple_container_extra_options:
        type: list
        elements: str
        required: false
        default: []
        description: Extra raw lines appended to the [Container] section.
