# Committed as-is — contains no secrets.
# Host / user / key are supplied at runtime via CLI flags (see the workflow).
[defaults]
host_key_checking   = False
retry_files_enabled = False
interpreter_python  = /usr/bin/python3
roles_path          = ./roles

[ssh_connection]
pipelining   = True
ssh_args     = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
