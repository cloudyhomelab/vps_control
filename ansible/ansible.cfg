# Committed as-is — contains no secrets.
# Host / user / key are supplied at runtime via CLI flags (see the workflow).
# The VPS host key is pinned via the VPS_KNOWN_HOSTS secret (written to
# ~/.ssh/known_hosts in CI), so host-key verification is kept on and strict.
[defaults]
host_key_checking   = True
retry_files_enabled = False
interpreter_python  = /usr/bin/python3
roles_path          = ./roles

# github_summary writes a per-run job summary to $GITHUB_STEP_SUMMARY (visible on
# the GitHub Actions run page); it no-ops when that env var is unset, so it is
# harmless for local runs.
callback_plugins    = ./callback_plugins
callbacks_enabled   = github_summary

[ssh_connection]
pipelining   = True
ssh_args     = -o StrictHostKeyChecking=yes
