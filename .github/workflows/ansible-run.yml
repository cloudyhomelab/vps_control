name: Run Ansible Playbook

# Generic, reusable workflow: runs any playbook under ansible/ against the VPS.
# Call it from another workflow:
#
#   jobs:
#     deploy:
#       uses: ./.github/workflows/ansible-run.yml
#       with:
#         playbook: playbooks/deploy_apps.yml
#       secrets: inherit

on:
  workflow_call:
    inputs:
      playbook:
        description: 'Playbook path, relative to the ansible/ directory'
        required: true
        type: string
      extra_vars:
        description: 'Optional extra vars passed to ansible-playbook via -e'
        required: false
        type: string
        default: ''
    secrets:
      VPS_SSH_KEY:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_KNOWN_HOSTS:
        required: true

# Least privilege: this workflow only reads the repo and deploys over SSH.
permissions:
  contents: read

jobs:
  run-playbook:
    name: Run ${{ inputs.playbook }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key to file
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

      - name: Pin VPS host key in known_hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run Ansible playbook
        working-directory: ansible
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PLAYBOOK: ${{ inputs.playbook }}
          EXTRA_VARS: ${{ inputs.extra_vars }}
        run: |
          set -eu
          ARGS="-i ${VPS_HOST}, -u ${VPS_USER} --private-key ${HOME}/.ssh/vps_key"
          if [ -n "${EXTRA_VARS}" ]; then
            ansible-playbook ${ARGS} -e "${EXTRA_VARS}" "${PLAYBOOK}" -v
          else
            ansible-playbook ${ARGS} "${PLAYBOOK}" -v
          fi

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key
